sources:
  sentinel-bigquery:
    kind: bigquery
    project: ${GCP_PROJECT_ID}
    location: ${GCP_LOCATION}

tools:

  # ── Alerts ────────────────────────────────────────────────────────────────────

  insert_alert:
    kind: bigquery-sql
    source: sentinel-bigquery
    description: Insert a new alert into alerts table
    statement: |
      INSERT INTO `${GCP_PROJECT_ID}.sentinel_db.alerts`
      (id, created_at, alert_type, sector, latitude, longitude,
       raw_payload, status, severity, threat_score)
      VALUES
      (@id, TIMESTAMP(@created_at), @alert_type, @sector,
       CAST(@latitude AS FLOAT64), CAST(@longitude AS FLOAT64),
       @raw_payload, @status, @severity, @threat_score)
    parameters:
      - name: id
        type: string
        description: Unique alert ID
      - name: created_at
        type: string
        description: Alert creation timestamp
      - name: alert_type
        type: string
        description: Type of alert
      - name: sector
        type: string
        description: Sector name
      - name: latitude
        type: string
        description: Latitude coordinate
      - name: longitude
        type: string
        description: Longitude coordinate
      - name: raw_payload
        type: string
        description: Raw payload data
      - name: status
        type: string
        description: Alert status
      - name: severity
        type: string
        description: Severity level
      - name: threat_score
        type: integer
        description: Threat score

  get_alert_by_id:
    kind: bigquery-sql
    source: sentinel-bigquery
    description: Fetch alert by ID
    statement: |
      SELECT * FROM `${GCP_PROJECT_ID}.sentinel_db.alerts`
      WHERE id = @id
      LIMIT 1
    parameters:
      - name: id
        type: string
        description: Alert ID

  update_alert_status:
    kind: bigquery-sql
    source: sentinel-bigquery
    description: Update alert status
    statement: |
      UPDATE `${GCP_PROJECT_ID}.sentinel_db.alerts`
      SET status = @status
      WHERE id = @id
    parameters:
      - name: id
        type: string
        description: Alert ID
      - name: status
        type: string
        description: New status

  update_alert_threat:
    kind: bigquery-sql
    source: sentinel-bigquery
    description: Update threat score and severity
    statement: |
      UPDATE `${GCP_PROJECT_ID}.sentinel_db.alerts`
      SET threat_score = @threat_score,
          severity = @severity
      WHERE id = @id
    parameters:
      - name: id
        type: string
        description: Alert ID
      - name: threat_score
        type: integer
        description: Threat score
      - name: severity
        type: string
        description: Severity level

  list_alerts:
    kind: bigquery-sql
    source: sentinel-bigquery
    description: List recent alerts ordered by creation time
    statement: |
      SELECT * FROM `${GCP_PROJECT_ID}.sentinel_db.alerts`
      ORDER BY created_at DESC
      LIMIT @limit
    parameters:
      - name: limit
        type: integer
        description: Maximum number of alerts to return

  # ── Historical Incidents ───────────────────────────────────────────────────────

  get_sector_history:
    kind: bigquery-sql
    source: sentinel-bigquery
    description: Fetch recent incidents for a sector
    statement: |
      SELECT id, occurred_at, sector, incident_type, severity, description, resolved
      FROM `${GCP_PROJECT_ID}.sentinel_db.historical_incidents`
      WHERE sector = @sector
        AND occurred_at >= TIMESTAMP_SUB(CURRENT_TIMESTAMP(), INTERVAL @days_back DAY)
      ORDER BY occurred_at DESC
      LIMIT @limit
    parameters:
      - name: sector
        type: string
        description: Sector name
      - name: days_back
        type: integer
        description: Number of days to look back
      - name: limit
        type: integer
        description: Maximum number of records

  insert_historical_incident:
    kind: bigquery-sql
    source: sentinel-bigquery
    description: Insert a historical incident record
    statement: |
      INSERT INTO `${GCP_PROJECT_ID}.sentinel_db.historical_incidents`
      (id, occurred_at, sector, incident_type, severity, description, resolved)
      VALUES
      (@id, TIMESTAMP(@occurred_at), @sector, @incident_type,
       @severity, @description, @resolved)
    parameters:
      - name: id
        type: string
        description: Incident ID
      - name: occurred_at
        type: string
        description: Occurrence timestamp
      - name: sector
        type: string
        description: Sector name
      - name: incident_type
        type: string
        description: Incident type
      - name: severity
        type: string
        description: Severity level
      - name: description
        type: string
        description: Incident description
      - name: resolved
        type: boolean
        description: Whether incident is resolved

  # ── Pending Actions ────────────────────────────────────────────────────────────

  insert_pending_action:
    kind: bigquery-sql
    source: sentinel-bigquery
    description: Insert a new pending action awaiting commander approval
    statement: |
      INSERT INTO `${GCP_PROJECT_ID}.sentinel_db.pending_actions`
      (id, alert_id, created_at, agent_name, action_type,
       description, payload, status)
      VALUES
      (@id, @alert_id, TIMESTAMP(@created_at), @agent_name,
       @action_type, @description, @payload, @status)
    parameters:
      - name: id
        type: string
        description: Action ID
      - name: alert_id
        type: string
        description: Associated alert ID
      - name: created_at
        type: string
        description: Creation timestamp
      - name: agent_name
        type: string
        description: Agent that created the action
      - name: action_type
        type: string
        description: Type of action
      - name: description
        type: string
        description: Human-readable description
      - name: payload
        type: string
        description: JSON-encoded action payload
      - name: status
        type: string
        description: Initial status (pending)

  get_pending_action_by_id:
    kind: bigquery-sql
    source: sentinel-bigquery
    description: Fetch a single pending action by ID
    statement: |
      SELECT * FROM `${GCP_PROJECT_ID}.sentinel_db.pending_actions`
      WHERE id = @id
      LIMIT 1
    parameters:
      - name: id
        type: string
        description: Action ID

  list_pending_actions:
    kind: bigquery-sql
    source: sentinel-bigquery
    description: List pending actions filtered by status
    statement: |
      SELECT * FROM `${GCP_PROJECT_ID}.sentinel_db.pending_actions`
      WHERE status = @status
      ORDER BY created_at DESC
    parameters:
      - name: status
        type: string
        description: Status to filter by (pending, approved, rejected, executed, failed)

  update_pending_action_status:
    kind: bigquery-sql
    source: sentinel-bigquery
    description: Update status and decision metadata on a pending action
    statement: |
      UPDATE `${GCP_PROJECT_ID}.sentinel_db.pending_actions`
      SET status = @status,
          decided_at = TIMESTAMP(@decided_at),
          decided_by = @decided_by,
          reject_reason = @reject_reason
      WHERE id = @id
    parameters:
      - name: id
        type: string
        description: Action ID
      - name: status
        type: string
        description: New status (approved, rejected, executed, failed)
      - name: decided_at
        type: string
        description: Decision timestamp
      - name: decided_by
        type: string
        description: Who made the decision
      - name: reject_reason
        type: string
        description: Reason for rejection (empty string if approved or executed)

  # ── Sitrep Drafts ─────────────────────────────────────────────────────────

  insert_sitrep_draft:
    kind: bigquery-sql
    source: sentinel-bigquery
    description: Insert a situation report draft
    statement: |
      INSERT INTO `${GCP_PROJECT_ID}.sentinel_db.sitrep_drafts`
        (id, alert_id, created_at, sector, threat_score,
         summary, recommended_actions, notes_mcp_id)
      VALUES
        (@id, @alert_id, TIMESTAMP(@created_at), @sector,
         @threat_score, @summary, @recommended_actions, @notes_mcp_id)
    parameters:
      - name: id
        type: string
        description: Sitrep draft ID
      - name: alert_id
        type: string
        description: Associated alert ID
      - name: created_at
        type: string
        description: Creation timestamp
      - name: sector
        type: string
        description: Sector name
      - name: threat_score
        type: integer
        description: Threat score
      - name: summary
        type: string
        description: Sitrep summary text
      - name: recommended_actions
        type: string
        description: Recommended actions text
      - name: notes_mcp_id
        type: string
        description: Notes MCP ID, empty string initially

  update_sitrep_notes_id:
    kind: bigquery-sql
    source: sentinel-bigquery
    description: Update notes_mcp_id on a sitrep draft
    statement: |
      UPDATE `${GCP_PROJECT_ID}.sentinel_db.sitrep_drafts`
      SET notes_mcp_id = @notes_mcp_id
      WHERE id = @id
    parameters:
      - name: id
        type: string
        description: Sitrep draft ID
      - name: notes_mcp_id
        type: string
        description: Notes MCP ID to set

  # ── Audit Log ──────────────────────────────────────────────────────────────────

  insert_audit_log:
    kind: bigquery-sql
    source: sentinel-bigquery
    description: Insert an audit log entry
    statement: |
      INSERT INTO `${GCP_PROJECT_ID}.sentinel_db.audit_logs`
      (id, alert_id, timestamp, actor, action, detail, success)
      VALUES
      (@id, @alert_id, TIMESTAMP(@timestamp),
       @actor, @action, @detail, @success)
    parameters:
      - name: id
        type: string
        description: Log ID
      - name: alert_id
        type: string
        description: Associated alert ID (empty string if not alert-specific)
      - name: timestamp
        type: string
        description: Event timestamp
      - name: actor
        type: string
        description: Actor name (agent or user)
      - name: action
        type: string
        description: Action performed
      - name: detail
        type: string
        description: Additional detail
      - name: success
        type: boolean
        description: Whether action succeeded

  get_audit_trail:
    kind: bigquery-sql
    source: sentinel-bigquery
    description: Fetch full audit trail for an alert ordered by time
    statement: |
      SELECT * FROM `${GCP_PROJECT_ID}.sentinel_db.audit_logs`
      WHERE alert_id = @alert_id
      ORDER BY timestamp ASC
    parameters:
      - name: alert_id
        type: string
        description: Alert ID to retrieve audit trail for

  get_all_audit_logs:
    kind: bigquery-sql
    source: sentinel-bigquery
    description: Fetch all audit logs ordered by timestamp descending
    statement: |
      SELECT * FROM `${GCP_PROJECT_ID}.sentinel_db.audit_logs`
      ORDER BY timestamp DESC
      LIMIT @limit
    parameters:
      - name: limit
        type: integer
        description: Maximum number of audit log entries to return

  # ── Dashboard Stats ────────────────────────────────────────────────────────────

  count_alerts_since:
    kind: bigquery-sql
    source: sentinel-bigquery
    description: Count alerts created since a specific date
    statement: |
      SELECT COUNT(*) as count
      FROM `${GCP_PROJECT_ID}.sentinel_db.alerts`
      WHERE DATE(created_at) >= DATE(@since_date)
    parameters:
      - name: since_date
        type: string
        description: Date string in YYYY-MM-DD format

  get_latest_scan_timestamp:
    kind: bigquery-sql
    source: sentinel-bigquery
    description: Get the most recent scan timestamp across all sectors
    statement: |
      SELECT MAX(scanned_at) as latest_scan
      FROM `${GCP_PROJECT_ID}.sentinel_db.vision_scans`
    parameters: []

  # ── Vision Scans ──────────────────────────────────────────────────────────
  insert_vision_scan:
    kind: bigquery-sql
    source: sentinel-bigquery
    description: Insert a vision scan result
    statement: |
      INSERT INTO `${GCP_PROJECT_ID}.sentinel_db.vision_scans`
        (id, alert_id, sector, scanned_at, image_source,
         image_lat, image_lon, zoom_level, anomalies_detected,
         anomaly_count, threat_indicators, overall_assessment,
         recommended_action, image_quality, annotated_image_uri)
      VALUES
        (@id, @alert_id, @sector, TIMESTAMP(@scanned_at),
         @image_source, CAST(@image_lat AS FLOAT64), CAST(@image_lon AS FLOAT64),
         @zoom_level, @anomalies_detected, @anomaly_count, @threat_indicators,
         @overall_assessment, @recommended_action,
         @image_quality, @annotated_image_uri)
    parameters:
      - name: id
        type: string
        description: Unique vision scan ID
      - name: alert_id
        type: string
        description: Associated alert ID, empty string if standalone
      - name: sector
        type: string
        description: Sector name that was scanned
      - name: scanned_at
        type: string
        description: Scan timestamp in ISO format
      - name: image_source
        type: string
        description: Source of image e.g. mapbox_satellite, google_maps, osm_tiles
      - name: image_lat
        type: string
        description: Latitude of image center as string
      - name: image_lon
        type: string
        description: Longitude of image center as string
      - name: zoom_level
        type: integer
        description: Zoom level used for image fetch
      - name: anomalies_detected
        type: boolean
        description: Whether anomalies were detected
      - name: anomaly_count
        type: integer
        description: Number of anomalies detected
      - name: threat_indicators
        type: string
        description: JSON-encoded list of threat indicator objects
      - name: overall_assessment
        type: string
        description: Overall assessment text from vision agent
      - name: recommended_action
        type: string
        description: Recommended action e.g. none, patrol_verification, immediate_alert
      - name: image_quality
        type: string
        description: Image quality rating e.g. good, partial, poor
      - name: annotated_image_uri
        type: string
        description: GCS URI of annotated image, empty string if unavailable

  get_vision_scan_by_id:
    kind: bigquery-sql
    source: sentinel-bigquery
    description: Fetch a vision scan by ID
    statement: |
      SELECT id, alert_id, sector, scanned_at, image_source,
             image_lat, image_lon, zoom_level, anomalies_detected,
             anomaly_count, threat_indicators, overall_assessment,
             recommended_action, image_quality, annotated_image_uri
      FROM `${GCP_PROJECT_ID}.sentinel_db.vision_scans`
      WHERE id = @id
      LIMIT 1
    parameters:
      - name: id
        type: string
        description: Vision scan ID to fetch

  get_sector_scan_history:
    kind: bigquery-sql
    source: sentinel-bigquery
    description: Fetch recent vision scans for a sector
    statement: |
      SELECT id, sector, scanned_at, image_source, image_lat, image_lon,
             zoom_level, anomalies_detected, anomaly_count,
             overall_assessment, recommended_action, image_quality,
             threat_indicators
      FROM `${GCP_PROJECT_ID}.sentinel_db.vision_scans`
      WHERE sector = @sector
      ORDER BY scanned_at DESC
      LIMIT @limit
    parameters:
      - name: sector
        type: string
        description: Sector name to fetch scan history for
      - name: limit
        type: integer
        description: Maximum number of scan records to return

  # ── Google Maps API Usage Log ─────────────────────────────────────────────
  log_maps_api_call:
    kind: bigquery-sql
    source: sentinel-bigquery
    description: Log a Google Maps API call to the audit trail
    statement: |
      INSERT INTO `${GCP_PROJECT_ID}.sentinel_db.audit_logs`
        (id, alert_id, timestamp, actor, action, detail, success)
      VALUES
        (@id, @alert_id, TIMESTAMP(@called_at),
         'google_maps_mcp', @api_name,
         CONCAT('lat=', @lat, ' lon=', @lon),
         @success)
    parameters:
      - name: id
        type: string
        description: Unique log entry ID
      - name: alert_id
        type: string
        description: Associated alert ID, empty string if not alert-specific
      - name: called_at
        type: string
        description: Timestamp of the API call in ISO format
      - name: api_name
        type: string
        description: Name of the Google Maps API called
      - name: lat
        type: string
        description: Latitude used in the API call as string
      - name: lon
        type: string
        description: Longitude used in the API call as string
      - name: success
        type: boolean
        description: Whether the API call succeeded
  # ── Patrol Logs ──────────────────────────────────────────────────────────────
  insert_patrol_log:
    kind: bigquery-sql
    source: sentinel-bigquery
    description: Insert a patrol log entry after a patrol action is executed
    statement: |
      INSERT INTO `${GCP_PROJECT_ID}.sentinel_db.patrol_logs`
        (id, alert_id, sector, patrol_start, patrol_end,
         unit_assigned, route_notes, calendar_event_id, created_at)
      VALUES
        (@id, @alert_id, @sector, TIMESTAMP(@patrol_start),
         TIMESTAMP(@patrol_end), @unit_assigned, @route_notes,
         @calendar_event_id, TIMESTAMP(@created_at))
    parameters:
      - name: id
        type: string
        description: Unique patrol log ID
      - name: alert_id
        type: string
        description: Associated alert ID
      - name: sector
        type: string
        description: Sector name where patrol is deployed
      - name: patrol_start
        type: string
        description: Patrol start time in ISO format
      - name: patrol_end
        type: string
        description: Patrol end time in ISO format
      - name: unit_assigned
        type: string
        description: Military unit assigned to the patrol
      - name: route_notes
        type: string
        description: Patrol route and instructions
      - name: calendar_event_id
        type: string
        description: Google Calendar event ID, empty string if calendar unavailable
toolsets:
  sentinel-all:
    - insert_alert
    - get_alert_by_id
    - update_alert_status
    - update_alert_threat
    - list_alerts
    - get_sector_history
    - insert_historical_incident
    - insert_pending_action
    - get_pending_action_by_id
    - list_pending_actions
    - update_pending_action_status
    - insert_audit_log
    - get_audit_trail
    - insert_sitrep_draft
    - update_sitrep_notes_id
    - insert_vision_scan
    - get_vision_scan_by_id
    - get_sector_scan_history
    - log_maps_api_call
    - insert_patrol_log